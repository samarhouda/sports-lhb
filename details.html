<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails Produit - Sports LHB</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Sports LHB</h1>
</header>

<section class="produit-page">

    <img id="detailImage" src="" alt="Produit">

    <div class="info-produit">

        <h2 id="detailNom"></h2>

        <h3 id="detailPrix"></h3>

        <p id="detailDescription"></p>

        <p id="detailMoyenneAvis" class="moyenne-avis"></p>

        <button id="btnAcheter">
            Acheter
        </button>

        <h3>Avis clients</h3>

        <input type="text" id="nomClientAvis" placeholder="Votre nom">

        <select id="noteAvis">
            <option value="">Note</option>
            <option value="1">1 étoile</option>
            <option value="2">2 étoiles</option>
            <option value="3">3 étoiles</option>
            <option value="4">4 étoiles</option>
            <option value="5">5 étoiles</option>
        </select>

        <input type="text" id="commentaire" placeholder="Votre commentaire">

        <button onclick="ajouterCommentaire()">
            Envoyer
        </button>

        <div id="listeCommentaires"></div>

        <br><br>

        <a href="index.html" class="details-btn">
            ⬅ Retour Accueil
        </a>

    </div>

</section>

<script src="script.js"></script>

</body>
</html>
